name: Moodle-Postgres-Redis Network
networks:
  moodle-network:
services:
    php_server:
      container_name: php_server
      build:
        context: .
        dockerfile: php_server.Dockerfile
      ports:
        - 80:80
        - 443:443
      healthcheck:
        test: ["CMD", "curl", "-f", "http://${MOODLE_ROOT}:80/" ]
        interval: 30s
        timeout: 10s
        retries: 3
        start_period: 60s
      restart: unless-stopped
      depends_on:
        postgres:
          condition: service_healthy
      volumes:
       - ./docker_data/moodledata:/data/moodledata
    postgres:
      container_name: postgres
      image: postgres:${POSTGRES_VERSION}
      restart: always
      # set shared memory limit when using docker compose
      shm_size: 128mb
      # or set shared memory limit when deploy via swarm stack
      #volumes:
      #  - type: tmpfs
      #    target: /dev/shm
      #    tmpfs:
      #      size: 134217728 # 128*2^20 bytes = 128Mb*
      environment:
        POSTGRES_USER: ${POSTGRES_USER}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        POSTGRES_DB: ${POSTGRES_DB}
        ALLOW_EMPTY_PASSWORD: ${ALLOW_EMPTY_PASSWORD}
        PGDATA: ${PGDATA}
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h localhost -p 5432"]
        interval: 5s
        timeout: 5s
        retries: 5
      volumes:
        - ./docker_data/postgres:/var/lib/postgresql/18/docker
    pgadmin:
      container_name: pgadmin
      image: elestio/pgadmin:latest
      restart: always
      environment:
        PGADMIN_DEFAULT_EMAIL: ${ADMIN_EMAIL}
        PGADMIN_DEFAULT_PASSWORD: ${ADMIN_PASSWORD}
        PGADMIN_LISTEN_PORT: 8443
      ports:
        - 8443:8443
      depends_on:
        postgres:
          condition: service_healthy
      volumes:
      - ./docker_data/pgadmin/servers.json:/docker_data/pgadmin4/servers.json
    redis:
      container_name: redis
      image: redis:${REDIS_VERSION}
      restart: unless-stopped
      environment:
        REDIS_HOST: ${REDIS_HOST}
        REDIS_PORT: ${REDIS_PORT}
        REDIS_USERNAME: ${REDIS_USERNAME}
        REDIS_SS: ${REDIS_SS}
        REDIS_CA_PATH: ${REDIS_CA_PATH}
        REDIS_SSL_KEYFILE: ${REDIS_SSL_KEYFILE}
        REDIS_SSL_CERTFILE: ${REDIS_SSL_CERTFILE}
        REDIS_CERT_REQS: ${REDIS_CERT_REQS}
        REDIS_CA_CERTS: ${REDIS_CA_CERTS}
        REDIS_CLUSTER_MODE: ${REDIS_CLUSTER_MODE}
        REDIS_PWD: ${REDIS_PWD}
      healthcheck:
        test: ["CMD", "redis-cli", "ping"]
        interval: 10s
        timeout: 5s
        retries: 3
      volumes:
        - ./docker_data/moodle_redis:/docker_data/redis-data
    redisinsight:
      container_name: redisinsight
      image: redis/redisinsight:${REDISINSIGHT_VERSION}
      restart: always
      environment:
        RI_APP_PORT: 5540
        RI_APP_HOST: 0.0.0.0
      ports:
        - 5540:5540
      volumes:
        - ./docker_data/moodle_redisinsight:/docker_data/redisinsight-db
volumes:
  docker_moodledata:
  docker_postgres:
  docker_redis:
  docker_redisinsight:
    
networks:
  moodle-network:
services:
    moodle:
      build:
        context: .
        dockerfile: Moodle.Dockerfile
      ports:
        - "${MOODLE_HOST:-0.0.0.0}:${MOODLE_PORT:-80}:80"
      environment:
        MOODLE_LANG: ${MOODLE_LANG}
        MOODLE_ROOT: ${MOODLE_ROOT}
        MOODLE_DBTYPE: ${MOODLE_DBTYPE}
        MOODLE_DBHOST: ${MOODLE_DBHOST}
        MOODLE_DBNAME: ${MOODLE_DBNAME}
        MOODLE_DBUSER: ${MOODLE_DBUSER}
        MOODLE_DBPASS: ${MOODLE_DBPASS}
        MOODLE_ADMIN_USER: ${MOODLE_ADMIN_USER}
        MOODLE_ADMIN_PASS: ${MOODLE_ADMIN_PASS}
        MOODLE_FULLNAME: ${MOODLE_FULLNAME}
        MOODLE_SHORTNAME: ${MOODLE_SHORTNAME}
        MOODLE_ADMIN_EMAIL: ${MOODLE_ADMIN_EMAIL}
        MOODLE_SUPPORT_EMAIL: ${MOODLE_SUPPORT_EMAIL}
      healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:443/" ]
        interval: 30s
        timeout: 10s
        retries: 3
        start_period: 60s
      restart: unless-stopped
      depends_on:
        postgres:
          condition: service_healthy
    postgres:
      image: postgres:${POSTGRES_VERSION}
      restart: always
      # set shared memory limit when using docker compose
      shm_size: 128mb
      # or set shared memory limit when deploy via swarm stack
      #volumes:
      #  - type: tmpfs
      #    target: /dev/shm
      #    tmpfs:
      #      size: 134217728 # 128*2^20 bytes = 128Mb*
      ports:
        - "${POSTGRES_HOST:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
      environment:
        POSTGRES_USER: ${POSTGRES_USER}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        POSTGRES_DB: ${POSTGRES_DB}
        ALLOW_EMPTY_PASSWORD: ${ALLOW_EMPTY_PASSWORD}
        PGDATA: ${PGDATA}
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h localhost -p 5432"]
        interval: 5s
        timeout: 5s
        retries: 5
      volumes:
        - ./postgres:/var/lib/postgresql/18/docker
    pgadmin:
      image: elestio/pgadmin:latest
      restart: always
      environment:
        PGADMIN_DEFAULT_EMAIL: ${ADMIN_EMAIL}
        PGADMIN_DEFAULT_PASSWORD: ${ADMIN_PASSWORD}
        PGADMIN_LISTEN_PORT: 8443
      ports:
        - "${PGADMIN_HOST:-127.0.0.1}:${PGADMIN_PORT:-8081}:80"
      depends_on:
        postgres:
          condition: service_healthy
      volumes:
      - ./servers.json:/pgadmin4/servers.json
    redis:
      image: redis:${REDIS_VERSION}
      restart: unless-stopped
      healthcheck:
        test: ["CMD", "redis-cli", "ping"]
        interval: 10s
        timeout: 5s
        retries: 3
      ports:
        - "${REDIS_HOST:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
      volumes:
        - ./moodle_redis:/data
      profiles: ["cache", "dev", "full"]
    redisinsight:
      image: redis/redisinsight:${REDISINSIGHT_VERSION}
      restart: always
      environment:
        RI_APP_PORT: 5540
        RI_APP_HOST: 0.0.0.0
      ports:
        - "${REDISINSIGHT_HOST:-127.0.0.1}:${REDISINSIGHT_PORT:-5540}:5540"
      volumes:
        - ./redisinsight:/db